site_name: BIGC CTF Writeups
site_url: https://starnotes-xj.github.io/BIGC_CTF_Writeups/
site_description: CTF 竞赛解题记录与学习笔记
site_author: BIGC CTF Team

docs_dir: CTF_Writeups
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/shield-half-full
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  custom_dir: overrides

plugins:
  - search:
      lang:
        - zh
        - en
  - tags:

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/starnotes-xj/BIGC_CTF_Writeups
      name: GitHub
  generator: false
  # Giscus 评论配置 - 需要替换为你的实际值
  comments:
    enabled: true
    # 在 https://giscus.app 生成以下配置
    giscus_repo: "your-username/your-repo"
    giscus_repo_id: ""
    giscus_category: "Writeup Comments"
    giscus_category_id: ""

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/drawer-backdrop.js

extra_css:
  - stylesheets/extra_v3.css

nav:
  - 首页: index.md
  - Web:
      - Web/NovruzCTF_kecel-scanner.md
      - Web/NovruzCTF_Novruzland.md
      - Web/NovruzCTF_loteraya.md
      - Web/NovruzCTF_python-serverl.md
      - Web/NovruzCTF_waf.md
      - Web/NovruzCTF_Novruz_Secret_Keeper.md
      - Web/NovruzCTF_The_Ghost_inside_the_Machine.md
  - 密码学:
      - "Cryptography(\u5BC6\u7801\u5B66)/NovruzCTF_Echoes_of_the_Serpent.md"
      - "Cryptography(\u5BC6\u7801\u5B66)/NovruzCTF_The_Magical_Meal.md"
  - 逆向工程:
      - "Reverse Engineering(\u9006\u5411\u5DE5\u7A0B)/NovruzCTF_Novruz_Reverse_by_Zoktay.md"
      - "Reverse Engineering(\u9006\u5411\u5DE5\u7A0B)/NovruzCTF_Pakhlivan_fell_in_love_with_Zoktay.md"
      - "Reverse Engineering(\u9006\u5411\u5DE5\u7A0B)/NovruzCTF_Novruz Ritual.md"
  - 杂项:
      - "Misc(\u6742\u9879)/NovruzCTF_Speedrun.md"
      - "Misc(\u6742\u9879)/NovruzCTF_Terminal.md"
      - "Misc(\u6742\u9879)/NovruzCTF_WYCGPRB.md"
      - "Misc(\u6742\u9879)/NovruzCTF_one_in_million.md"
  - PPC:
      - PPC/NovruzCTF_Floating_in_Samani.md
  - 比赛:
      - events/index.md
      - NovruzCTF 2026: events/NovruzCTF_2026/index.md
      - 历史参赛记录: history/competitions.md
  - 标签: tags.md
  - 模板: WRITEUP_TEMPLATE.md
